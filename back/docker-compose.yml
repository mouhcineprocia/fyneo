version: '3.8'

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: fyneo
      POSTGRES_PASSWORD: fyneo
      POSTGRES_DB: fyneo
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
